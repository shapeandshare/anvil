name: CI Gates

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup environment
        run: make setup
      - name: Run lint
        id: check
        run: |
          make lint && echo "result=passed" >> "$GITHUB_OUTPUT" || echo "result=failed" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    if: needs.lint.outputs.result == 'passed'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup environment
        run: make setup
      - name: Run tests with coverage
        run: make test

  gate-status:
    name: Gate Status
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [lint, test]
    if: always()
    steps:
      - name: Summarize gate results
        run: |
          echo "## Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"