name: CI Gates

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  bump-scope-guard:
    name: Bump Scope Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Install anvil
        run: echo "skip install"
      - name: Classify change scope
        id: classify
        run: |
          echo "scope=full" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: bump-scope-guard
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup environment
        run: make setup
      - name: Run lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: bump-scope-guard
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup environment
        run: make setup
      - name: Run tests with coverage
        run: make test

  gate-status:
    name: Gate Status
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [bump-scope-guard, lint, test]
    if: always()
    steps:
      - name: Summarize gate results
        run: |
          echo "## Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for gate in bump-scope-guard lint test; do
            STATUS="${{ needs[gate].result }}"
            echo "| $gate | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"