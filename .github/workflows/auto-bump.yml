# Auto Bump workflow for anvil
#
# Safety-net workflow: if source code lands on main without a version
# bump, this opens a patch-bump PR automatically. This handles edge
# cases where the release workflow is suppressed or code is pushed
# outside the normal PR flow.
#
# workflow_dispatch is available as a manual escape hatch.
#
# Required GitHub Secrets:
# - BUMP_PAT: Fine-grained PAT with Contents: write, Pull requests: write,
#   Workflows: write permissions. Required because GITHUB_TOKEN PRs
#   don't trigger CI checks under branch protection.

name: Auto Bump

on:
  push:
    branches: [main]
    paths:
      - 'anvil/**'
      - '!CHANGELOG.md'
      - '!.github/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-bump
  cancel-in-progress: false

jobs:
  check-and-bump:
    name: Auto Patch Bump
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install anvil
        run: pip install .

      - name: Check if version was bumped
        id: check
        run: |
          anvil-vault check-version >> "$GITHUB_OUTPUT"

      - name: Preflight BUMP_PAT check
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          if [ -z "${BUMP_PAT:-}" ]; then
            echo "::error::BUMP_PAT secret is missing or empty."
            echo "::error::"
            echo "::error::The auto-bump workflow requires BUMP_PAT for"
            echo "::error::PR creation. GITHUB_TOKEN cannot be used because"
            echo "::error::PRs opened by it don't trigger CI checks."
            echo "::error::"
            echo "::error::To fix: Create a fine-grained PAT with"
            echo "::error::Contents: write, Pull requests: write,"
            echo "::error::Workflows: write permissions and add it as"
            echo "::error::a repository secret named BUMP_PAT."
            exit 1
          fi
        env:
          BUMP_PAT: ${{ secrets.BUMP_PAT }}

      - name: Open auto bump-patch PR
        if: steps.check.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.BUMP_PAT }}
        run: |
          set -euo pipefail

          CURRENT="${{ steps.check.outputs.version_current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          BRANCH="ci/auto-bump-patch-${NEW_VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}" --no-recurse-submodules

          # Bump version + prepend changelog via Python (replaces fragile sed)
          anvil-vault bump-patch

          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: auto bump version ${CURRENT} -> ${NEW_VERSION}

          Automated patch bump: source code landed on main without
          a version bump in the same commit. [skip ci]"

          git push origin "${BRANCH}"

          PR_BODY="Automated patch version bump.

          Source code landed on \`main\` without a version bump in the same commit.
          This PR applies a \`patch\` bump as the safety-net fallback.

          If a \`minor\` or \`major\` bump is more appropriate, close this PR
          and bump the version manually before opening your next PR."

          PR_URL=$(gh pr create \
            --title "chore: auto bump version ${CURRENT} -> ${NEW_VERSION}" \
            --body "${PR_BODY}" \
            --base main \
            --head "${BRANCH}")

          gh pr merge "${PR_URL}" --auto --squash

          echo "Auto-bump PR opened and auto-merged: ${PR_URL}"