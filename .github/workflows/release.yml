# Release workflow for anvil
#
# Single workflow handling version detection, bumping, and release.
# Replaces the old Release + Auto Bump dual-workflow design.
#
# On push to main (with source changes): classifies the merge commit via
# conventional commit → bumps MAJOR/MINOR/PATCH via anvil-vault → creates
# an auto-merge bump PR → tags + GitHub Release.
#
# workflow_dispatch is available as an escape hatch for edge cases where
# GitHub suppresses push-based workflows.
#
# Required GitHub Secrets:
# - BUMP_PAT: Fine-grained PAT with Contents: write, Pull requests: write,
#   Workflows: write permissions. Required because GITHUB_TOKEN PRs
#   don't trigger CI checks under branch protection.

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'anvil/**'
      - '!CHANGELOG.md'
      - '!.github/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 -- Detect version change and determine bump type
  # ---------------------------------------------------------------------------
  detect:
    name: Detect Version Bump
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
      increment: ${{ steps.check.outputs.increment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install anvil
        run: pip install .

      - name: Detect increment
        id: check
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          anvil-vault detect-increment >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 2 -- Bump version, create auto-merge PR, tag, and GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Bump and Release
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.version_changed == 'true'
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install anvil
        run: pip install .

      # -----------------------------------------------------------------------
      # Preflight + classification
      # -----------------------------------------------------------------------
      - name: Classify and preflight
        id: preflight
        env:
          BUMP_PAT: ${{ secrets.BUMP_PAT }}
        run: |
          set -euo pipefail

          INCREMENT="${{ needs.detect.outputs.increment }}"

          if [ "${INCREMENT}" = "NONE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${INCREMENT}" = "SKIP" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skip-bump=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # BUMP_PAT is required for PR creation (GITHUB_TOKEN PRs don't
          # trigger CI checks under branch protection rules).
          if [ -z "${BUMP_PAT:-}" ]; then
            echo "::error::BUMP_PAT secret is missing or empty."
            echo "::error::"
            echo "::error::The release workflow requires BUMP_PAT to create"
            echo "::error::auto-merge bump PRs. GITHUB_TOKEN cannot be used"
            echo "::error::because PRs opened by it don't trigger CI checks."
            echo "::error::"
            echo "::error::To fix:"
            echo "::error::1. Create a fine-grained PAT in GitHub Settings →"
            echo "::error::   Developer settings → Personal access tokens"
            echo "::error::2. Required permissions: Contents: write,"
            echo "::error::   Pull requests: write, Workflows: write"
            echo "::error::3. Add it as a repository secret named BUMP_PAT"
            echo "::error::   in Settings → Secrets and variables → Actions"
            echo "::error::4. Re-run this workflow via Actions → Release"
            exit 1
          fi

      - name: Skip release (no bump needed)
        if: steps.preflight.outputs.skip == 'true'
        run: |
          echo "Merge commit does not contain a version-affecting"
          echo "conventional commit type (feat/fix/BREAKING CHANGE)."
          echo "Skipping release."

      # -----------------------------------------------------------------------
      # Version bump — skipped if version was already bumped manually
      # -----------------------------------------------------------------------
      - name: Bump version
        id: bump
        if: steps.preflight.outputs.skip != 'true' && steps.preflight.outputs.skip-bump != 'true'
        run: |
          set -euo pipefail

          INCREMENT="${{ needs.detect.outputs.increment }}"
          echo "Running anvil-vault bump --increment ${INCREMENT}"

          anvil-vault bump --increment "${INCREMENT}"

          NEW_VERSION=$(grep '^version =' pyproject.toml \
            | sed 's/version = "\(.*\)"/\1/')
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version bumped to: ${NEW_VERSION}"

      - name: Read current version (skip-bump case, e.g. manual bump)
        id: version-read
        if: steps.preflight.outputs.skip-bump == 'true'
        run: |
          VERSION=$(grep '^version =' pyproject.toml \
            | sed 's/version = "\(.*\)"/\1/')
          echo "new_version=${VERSION}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build release notes (from CHANGELOG and PR description)
      # -----------------------------------------------------------------------
      - name: Fetch PR description
        id: pr-description
        if: steps.preflight.outputs.skip != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BRANCH=$(git log -1 --merges --format=%P | head -n1 || echo "")
          if [ -z "${BRANCH}" ]; then
            echo "Not a merge commit — no PR description available."
            exit 0
          fi

          PR_BODY=$(gh pr list --state merged --head "${BRANCH}" \
            --json body --jq '.[0].body' 2>/dev/null || echo "")
          echo "pr_body<<PR_EOF" >> "$GITHUB_OUTPUT"
          echo "${PR_BODY}" >> "$GITHUB_OUTPUT"
          echo "PR_EOF" >> "$GITHUB_OUTPUT"

          if [ -n "${PR_BODY}" ]; then
            echo "PR description fetched (${#PR_BODY} chars)"
          else
            echo "No PR description found or fetch failed"
          fi

      - name: Build release notes
        id: release-notes
        if: steps.preflight.outputs.skip != 'true'
        env:
          PR_BODY: ${{ steps.pr-description.outputs.pr_body }}
        run: |
          set -euo pipefail

          anvil-vault build-notes

          VERSION="${{ steps.bump.outputs.new_version || steps.version-read.outputs.new_version }}"
          TAG="v${VERSION}"

          if git tag --list "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — idempotent re-run detected."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Create bump PR with auto-merge (skip if version already bumped)
      # -----------------------------------------------------------------------
      - name: Create bump PR with auto-merge
        if: steps.release-notes.outputs.exists != 'true' && steps.preflight.outputs.skip-bump != 'true'
        env:
          GH_TOKEN: ${{ secrets.BUMP_PAT }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.release-notes.outputs.version }}"
          BRANCH="ci/bump-v${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # anvil-vault bump modifies files in-place. Create a commit,
          # branch, with a descriptive message. No [skip ci] needed:
          # the release workflow's path filter (anvil/** only) already
          # prevents loop-triggering when the bump PR merges.
          git checkout -b "${BRANCH}"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: bump version to v${VERSION}

          Automated version bump from release workflow."

          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --title "chore: bump version to v${VERSION}" \
            --body "Automated version bump from release workflow." \
            --base main \
            --head "${BRANCH}")

          gh pr merge "${PR_URL}" --auto --squash || {
            echo "Auto-merge enable returned non-zero. Verifying state..."
            STATE=$(gh pr view "${PR_URL}" --json state,autoMergeRequest \
              --jq 'if .state == "MERGED" or .autoMergeRequest != null then "ok" else "fail" end')
            if [ "${STATE}" != "ok" ]; then
              echo "FATAL: PR exists but auto-merge not enabled and PR not merged."
              exit 1
            fi
            echo "(auto-merge/merge confirmed despite non-zero exit)"
          }
          echo "Bump PR created and auto-merged: ${PR_URL}"

      # -----------------------------------------------------------------------
      # Create git tag and GitHub Release
      # -----------------------------------------------------------------------
      - name: Create git tag and GitHub Release
        if: steps.release-notes.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.release-notes.outputs.version }}"
          TAG="v${VERSION}"

          # If version was manually bumped, tag immediately (no bump PR to wait for)
          if [ "${{ steps.preflight.outputs.skip-bump }}" = "true" ]; then
            echo "Version was manually bumped — creating tag directly."
          else
            # Wait for auto-merge to complete (poll up to 2 minutes)
            MAX_WAIT=120
            WAIT=0
            while [ "${WAIT}" -lt "${MAX_WAIT}" ]; do
              git fetch origin main
              if git log origin/main --oneline -10 | grep -q "bump version to v${VERSION}"; then
                echo "Bump commit detected on main after ${WAIT}s"
                break
              fi
              sleep 5
              WAIT=$((WAIT + 5))
            done

            if [ "${WAIT}" -ge "${MAX_WAIT}" ]; then
              echo "::warning::Timed out waiting for bump PR to merge." \
                "Tag may not reflect the latest main."
            fi
          fi

          # Create tag and release from the merged result
          git fetch --tags origin
          git tag -f "${TAG}" origin/main
          git push origin "${TAG}"

          # Check if release already exists (idempotency)
          if gh release view "${TAG}" &>/dev/null; then
            echo "Release ${TAG} already exists — skipping."
          else
            gh release create "${TAG}" \
              --title "anvil ${TAG}" \
              --notes-file release-notes.md \
              --target main
            echo "Release ${TAG} created."
          fi

      # -----------------------------------------------------------------------
      # Infinite loop prevention
      # -----------------------------------------------------------------------
      - name: Loop detection
        if: always()
        run: |
          set -euo pipefail

          LAST_MSG=$(git log -1 --format=%B)
          if echo "${LAST_MSG}" | grep -q "\[skip ci\]"; then
            echo "Last commit contains [skip ci] — loop prevention active."
          else
            echo "Last commit does not contain [skip ci] — this is a human commit."
          fi

          RECENT_TAGS=$(git tag --list 'v*' --sort=-creatordate | head -2)
          TAG_COUNT=$(echo "${RECENT_TAGS}" | wc -l)
          if [ "${TAG_COUNT}" -ge 2 ]; then
            TAG1=$(echo "${RECENT_TAGS}" | sed -n '1p')
            TAG2=$(echo "${RECENT_TAGS}" | sed -n '2p')
            TIME1=$(git log -1 --format=%ct "${TAG1}")
            TIME2=$(git log -1 --format=%ct "${TAG2}")
            DIFF=$((TIME1 - TIME2))
            if [ "${DIFF}" -lt 120 ] && [ "${DIFF}" -gt 0 ]; then
              echo "::warning::Two releases within ${DIFF}s of each other."
              echo "::warning::If these appear automated (no human commits),"
              echo "::warning::check for a loop condition."
            fi
          fi