# anvil/data/curated-models.yaml
# Initial curated catalog of small models suitable for local fine-tuning.
# Architecture allow-list (v1): LlamaForCausalLM — models with this arch
# are runnable; all others are tracked but not runnable.
catalog:
  # --- Runnable (LlamaForCausalLM in allow-list) ---
  - hf_id: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    display_name: "TinyLlama 1.1B Chat"
    params: "1.1B"
    license: "Apache-2.0"
    architecture: "LlamaForCausalLM"
    tokenizer_family: "SentencePiece"
    url: "https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    tags:
      - "tiny"
      - "chat"
      - "instruction"
    resource_envelope:
      min_ram_gb: 8.0
      min_vram_per_backend:
        cpu: 0
        cuda: 4.0
        mps: 6.0
      supported_methods:
        - "lora"
        - "full"
      default_target_modules:
        - "q_proj"
        - "v_proj"
      default_target_modules:
        - "q_proj"
        - "v_proj"

  - hf_id: "Qwen/Qwen2.5-0.5B-Instruct"
    display_name: "Qwen 2.5 0.5B Instruct"
    params: "0.5B"
    license: "Apache-2.0"
    architecture: "Qwen2ForCausalLM"
    tokenizer_family: "tokenizers"
    url: "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct"
    tags:
      - "qwen"
      - "instruct"
      - "tiny"
    resource_envelope:
      min_ram_gb: 4.0
      min_vram_per_backend:
        cpu: 0
        cuda: 2.0
        mps: 3.0
      supported_methods:
        - "lora"
        - "full"