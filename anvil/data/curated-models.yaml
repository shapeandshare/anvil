# anvil/data/curated-models.yaml
# Initial curated catalog of small models suitable for local fine-tuning.
# Architecture allow-list (v1): LlamaForCausalLM — models with this arch
# are runnable; all others are tracked but not runnable.
catalog:
  # --- Runnable (LlamaForCausalLM in allow-list) ---
  - hf_id: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    display_name: "TinyLlama 1.1B Chat"
    params: "1.1B"
    license: "Apache-2.0"
    architecture: "LlamaForCausalLM"
    tokenizer_family: "SentencePiece"
    url: "https://huggingface.co/TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    tags:
      - "tiny"
      - "chat"
      - "instruction"
    resource_envelope:
      min_ram_gb: 8.0
      min_vram_per_backend:
        cpu: 0
        cuda: 4.0
        mps: 6.0
      supported_methods:
        - "lora"

  - hf_id: "TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T"
    display_name: "TinyLlama 1.1B (3T tokens)"
    params: "1.1B"
    license: "Apache-2.0"
    architecture: "LlamaForCausalLM"
    tokenizer_family: "SentencePiece"
    url: "https://huggingface.co/TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T"
    tags:
      - "tiny"
      - "base"
      - "pretrained"
    resource_envelope:
      min_ram_gb: 8.0
      min_vram_per_backend:
        cpu: 0
        cuda: 4.0
        mps: 6.0
      supported_methods:
        - "lora"

  # --- Track-only (not in v1 allow-list) ---
  - hf_id: "google/gemma-2-2b-it"
    display_name: "Gemma 2 2B IT"
    params: "2B"
    license: "Gemma"
    architecture: "GemmaForCausalLM"
    tokenizer_family: "SentencePiece"
    url: "https://huggingface.co/google/gemma-2-2b-it"
    tags:
      - "gemma"
      - "instruction"
      - "google"
    resource_envelope:
      min_ram_gb: 8.0
      min_vram_per_backend:
        cpu: 0
        cuda: 6.0
        mps: 8.0
