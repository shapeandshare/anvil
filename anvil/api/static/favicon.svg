<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Anvil favicon — 32×32 viewBox, adaptive dark/light mode.
    Reference path (svgrepo.com) at native 32×32 scale, shifted -1.5 vertically to center.
    Dark:  surface #1c1c1e bg + orange #ff9500 anvil (forge theme).
    Light: grouped-bg #f2f2f7 bg + dark #1c1c1e anvil.
    rx="7" matches ~22% corner radius (iOS icon convention at this scale).
  -->
  <style>
    .bg   { fill: #1c1c1e; }
    .icon { fill: #ff9500; }
    @media (prefers-color-scheme: light) {
      .bg   { fill: #f2f2f7; }
      .icon { fill: #1c1c1e; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="7"/>
