<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="currentColor" aria-hidden="true">
  <!--
    Blacksmith's anvil — left-facing side profile, single closed path.
    Horn curves smoothly into the flat face (arrives horizontally at face-left).
    Right heel stays flat then drops. Waist snaps in hard. Wide feet.

    Landmark coords:
      Horn tip:     (10, 66) — leftmost, ~41% down
      Face:         x=46..200, y=14 (flat horizontal)
      Heel:         stays y=14 to x=224, drops to y=44
      Waist:        x=82..158, y=98  (76px = 36% of 214px span)
      Pedestal:     x=82..158, y=98..124
      Feet:         x=24..216, y=130..155
  -->
  <path d="
    M 10,66
    C 23,46 30,14 46,14
    L 200,14
    C 218,14 224,14 224,44
    C 224,68 178,92 158,98
    L 158,124
    C 158,128 168,130 216,130
    L 216,155
    L 24,155
    L 24,130
    C 72,130 82,128 82,124
    L 82,98
    C 60,90 24,78 20,74
    C 14,70 10,68 10,66
    Z
  "/>
</svg>