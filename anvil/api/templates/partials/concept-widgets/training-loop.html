<div class="concept-widget" data-widget="training-loop">
  <p class="widget-label">Watch loss decrease during training</p>
  <input type="range" class="widget-slider" id="tl-scrubber" min="0" max="100" value="0" step="1" aria-label="Training step scrubber">
  <div class="tl-visual" style="margin-top:var(--space-2);">
    <div class="tl-loss" style="width:0%;height:6px;background:var(--accent);border-radius:3px;"></div>
  </div>
  <p class="widget-hint text-mono">loss: <span class="token-value" id="tl-loss-val">4.0000</span></p>
</div>
