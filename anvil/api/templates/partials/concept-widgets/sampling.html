<div class="concept-widget" data-widget="sampling">
  <label class="widget-label">Temperature: <span class="token-value" id="temp-value-widget">0.5</span></label>
  <input type="range" class="widget-slider" id="temp-slider-widget" min="0" max="2" step="0.1" value="0.5" aria-label="Temperature">
  <label class="widget-label">Top-K: <span class="token-value" id="topk-value-widget">5</span></label>
  <input type="range" class="widget-slider" id="topk-slider-widget" min="1" max="20" step="1" value="5" aria-label="Top-K">
  <div class="distribution-display" id="distribution-widget" aria-live="polite"></div>
</div>
