<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>microgpt-workbench</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app-shell">

<header class="app-header">
    <div class="app-logo">microgpt</div>
    <nav class="app-tabs">
      <span class="app-tab" data-target="/v1">Train</span>
      <span class="app-tab" data-target="/v1/experiments-page">Experiments</span>
      <span class="app-tab" data-target="/v1/datasets-page">Datasets</span>
      <span class="app-tab" data-target="/v1/operations-page">Ops</span>
      <span class="app-tab" data-target="/v1/inference-page">Inference</span>
      <span class="app-tab" data-target="/v1/models-page">Models</span>
    </nav>
    <div class="app-header-right">
      <span class="theme-toggle" id="theme-toggle">dark</span>
      <span class="app-version">v0.1.0</span>
    </div>
  </header>

  <div class="rainbow-strip"></div>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-statusbar">
    <span class="status-item online" id="status-system">ONLINE</span>
    <span class="status-item" id="status-time">--:--:--</span>
    <span class="status-item" id="status-uptime">0h 0m 0s</span>
    <span class="status-item">localhost</span>
  </footer>

</div>

<script>
(function() {
  var theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  var btn = document.getElementById('theme-toggle');
  btn.textContent = theme === 'dark' ? 'dark' : 'light';
  btn.addEventListener('click', function() {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    btn.textContent = next;
  });

  var path = window.location.pathname;
  document.querySelectorAll('.app-tab').forEach(function(tab) {
    var target = tab.getAttribute('data-target');
    if (path === target || (target === '/v1' && (path === '/' || path === '/v1'))) {
      tab.classList.add('active');
    }
    tab.addEventListener('click', function() {
      window.location.href = this.getAttribute('data-target');
    });
  });

  function updateClock() {
    var now = new Date();
    var h = now.getHours().toString().padStart(2, '0');
    var m = now.getMinutes().toString().padStart(2, '0');
    var s = now.getSeconds().toString().padStart(2, '0');
    document.getElementById('status-time').textContent = h + ':' + m + ':' + s;
  }
  setInterval(updateClock, 1000);
  updateClock();

  (function() {
    var uptime = 0;
    setInterval(function() {
      uptime++;
      var h = Math.floor(uptime / 3600);
      var m = Math.floor((uptime % 3600) / 60);
      var s = uptime % 60;
      document.getElementById('status-uptime').textContent = h + 'h ' + m + 'm ' + s + 's';
    }, 1000);
  })();
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
