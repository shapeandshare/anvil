{% extends "base.html" %}
{% block content %}
<section class="training-dashboard">
  <h2>🧠 Train a GPT Model</h2>
  <div class="config-form">
    <label>Steps: <input type="number" id="num_steps" value="1000" min="1" max="100000"></label>
    <label>Embedding: <input type="number" id="n_embd" value="16" min="4" max="256"></label>
    <label>Heads: <input type="number" id="n_head" value="4" min="1" max="16"></label>
    <label>Learning Rate: <input type="number" id="learning_rate" value="0.01" step="0.001" min="0.001" max="1"></label>
    <label>Temperature: <input type="number" id="temperature" value="0.5" step="0.1" min="0.1" max="2"></label>
    <button id="start-btn" onclick="startTraining()">🚀 Start Training</button>
  </div>
  <div class="training-results">
    <h3>📉 Loss</h3>
    <pre id="loss-display">Waiting to start...</pre>
    <h3>✨ Generated Samples</h3>
    <div id="samples-display"></div>
  </div>
</section>

<script>
let eventSource = null;
const START_BTN = document.getElementById('start-btn');
const LOSS_DISPLAY = document.getElementById('loss-display');
const SAMPLES_DISPLAY = document.getElementById('samples-display');

async function startTraining() {
  START_BTN.disabled = true;
  LOSS_DISPLAY.textContent = 'Starting...';
  const body = {
    num_steps: parseInt(document.getElementById('num_steps').value),
    n_embd: parseInt(document.getElementById('n_embd').value),
    n_head: parseInt(document.getElementById('n_head').value),
    learning_rate: parseFloat(document.getElementById('learning_rate').value),
    temperature: parseFloat(document.getElementById('temperature').value),
  };
  const resp = await fetch('/v1/training/start', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const { run_id } = await resp.json();
  eventSource = new EventSource(`/v1/training/stream/${run_id}`);
  eventSource.addEventListener('metrics', e => {
    const d = JSON.parse(e.data);
    LOSS_DISPLAY.textContent += `\nstep ${d.step}: loss ${d.loss.toFixed(4)}`;
  });
  eventSource.addEventListener('complete', e => {
    const d = JSON.parse(e.data);
    LOSS_DISPLAY.textContent += `\n\n✅ Final loss: ${d.final_loss.toFixed(4)}`;
    SAMPLES_DISPLAY.innerHTML = d.samples.map(s => `<span class="sample">${s}</span>`).join(' ');
    eventSource.close();
    START_BTN.disabled = false;
  });
}
</script>
{% endblock %}
