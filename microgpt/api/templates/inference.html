{% extends "base.html" %}
{% block content %}
<div class="panel">
  <div class="panel-titlebar">▌ INFERENCE — LLM SAMPLING</div>
  <div class="panel-body">
    <div class="config-grid">
      <label>
        <span class="label-text">MODEL</span>
        <div class="prompt-line">
          <span class="prompt-symbol">$</span>
          <span class="prompt-label">load --model</span>
          <select class="terminal-input" id="model-select" onchange="updateVersionSelect()"></select>
        </div>
      </label>
      <label id="version-label" style="display:none;">
        <span class="label-text">VERSION</span>
        <div class="prompt-line">
          <span class="prompt-symbol">$</span>
          <span class="prompt-label">load --version</span>
          <select class="terminal-input" id="version-select"></select>
        </div>
      </label>
      <label>
        <span class="label-text">TEMPERATURE</span>
        <div class="prompt-line">
          <span class="prompt-symbol">$</span>
          <span class="prompt-label">set temperature=</span>
          <input type="number" class="terminal-input" id="temperature" value="0.5" step="0.1" min="0.1" max="2" style="min-width:70px;">
        </div>
      </label>
      <label>
        <span class="label-text">SAMPLES</span>
        <div class="prompt-line">
          <span class="prompt-symbol">$</span>
          <span class="prompt-label">set num_samples=</span>
          <input type="number" class="terminal-input" id="num_samples" value="10" min="1" max="50" style="min-width:70px;">
        </div>
      </label>
      <div class="config-full" style="margin-top:4px;">
        <button class="terminal-btn glitch" onclick="runInference()">
          <span class="btn-prefix">$</span> ./generate
        </button>
      </div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-titlebar">▌ OUTPUT STREAM</div>
  <div class="panel-body">
    <pre class="telemetry" id="inference-status" style="min-height:24px;max-height:40px;padding:6px 10px;">Awaiting command...</pre>
    <div style="margin-top:8px;" id="inference-output"></div>
  </div>
</div>

<script>
(function() {
  var modelsData = [];

  window.loadModels = async function loadModels() {
    var resp = await fetch('/v1/inference/models');
    var data = await resp.json();
    var select = document.getElementById('model-select');
    if (data.models.length === 0) {
      select.innerHTML = '<option value="">No models registered</option>';
      document.getElementById('version-label').style.display = 'none';
      document.getElementById('inference-status').textContent = '! No models registered. Train an experiment and register it from the Experiments page.';
      return;
    }
    modelsData = data.models;
    select.innerHTML = data.models.map(function(m) {
      var loss = m.final_loss != null ? m.final_loss.toFixed(4) : '?';
      return '<option value="' + m.id + '" data-versions="1">' + m.name + ' — loss: ' + loss + '</option>';
    }).join('');
    updateVersionSelect();
  };

  window.updateVersionSelect = function() {
    var modelSelect = document.getElementById('model-select');
    var versionLabel = document.getElementById('version-label');
    var versionSelect = document.getElementById('version-select');
    var selectedId = parseInt(modelSelect.value);
    if (!selectedId) {
      versionLabel.style.display = 'none';
      return;
    }
    var model = modelsData.find(function(m) { return m.id === selectedId; });
    if (model && model.total_versions > 1) {
      versionLabel.style.display = '';
      versionSelect.innerHTML = '';
      for (var v = 1; v <= model.total_versions; v++) {
        var sel = v === model.latest_version ? ' selected' : '';
        versionSelect.innerHTML += '<option value="' + v + '"' + sel + '>v' + v + '</option>';
      }
    } else {
      versionLabel.style.display = 'none';
    }
  };

  window.runInference = async function runInference() {
    var modelSelect = document.getElementById('model-select');
    var modelId = parseInt(modelSelect.value);
    var versionLabel = document.getElementById('version-label');
    var version = versionLabel.style.display !== 'none'
      ? parseInt(document.getElementById('version-select').value)
      : 1;
    var statusEl = document.getElementById('inference-status');
    var outputEl = document.getElementById('inference-output');

    if (!modelId) {
      statusEl.textContent = '! Please select a model first.';
      return;
    }

    statusEl.textContent = '> generating (model ' + modelId + ' v' + version + ')...\n';
    outputEl.innerHTML = '';

    var resp = await fetch('/v1/inference/sample', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model_id: modelId,
        version: version,
        temperature: parseFloat(document.getElementById('temperature').value),
        num_samples: parseInt(document.getElementById('num_samples').value),
      }),
    });
    var data = await resp.json();
    statusEl.textContent = '> generated ' + data.samples.length + ' samples (model ' + modelId + ' v' + version + ')\n';
    outputEl.innerHTML = data.samples.map(function(s) {
      return '<span class="sample-block">[SAMPLE] ' + s + '</span>';
    }).join(' ');
  };

  loadModels();
})();
</script>
{% endblock %}
