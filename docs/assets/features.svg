      <tspan x="1052" dy="24">register your best models</tspan>
    </text>
  </g>

  <!-- CARD 3 — Models -->
  <g>
    <rect x="34" y="292" width="388" height="234" rx="20" fill="#1c1c1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="34" y="292" width="388" height="3" fill="#ff9500" clip-path="url(#fc3)"/>
    <g transform="translate(204, 316) scale(2)">
      <path d="M12 5 C11 4 9 4 7.5 4.5 C6 5 5 5.5 4.5 7 C3.5 8.5 3 11 3.5 13 C4 15 5.5 17 8 18 C9.5 18.5 11 18.5 12 18 Z" fill="none" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 5 C13 4 15 4 16.5 4.5 C18 5 19 5.5 19.5 7 C20.5 8.5 21 11 20.5 13 C20 15 18.5 17 16 18 C14.5 18.5 13 18.5 12 18 Z" fill="none" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="228" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Models</text>
    <text x="228" y="426" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#ebebf5" fill-opacity="0.78" text-anchor="middle">
      <tspan x="228" dy="0">Register, version &amp; export models</tspan>
      <tspan x="228" dy="24">to safetensors</tspan>
    </text>
  </g>

  <!-- CARD 4 — Learn -->
  <g>
    <rect x="446" y="292" width="388" height="234" rx="20" fill="#1c1c1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="446" y="292" width="388" height="3" fill="#ff9500" clip-path="url(#fc4)"/>
    <g transform="translate(616, 316) scale(2)">
      <path d="M10.5 10v10.5l1.5-1 1.5 1V10z" fill="#ff9500"/>
      <polygon points="3.5,6 11,4.5 11,19 3.5,19" fill="#ff9500"/>
      <polygon points="20.5,6 13,4.5 13,19 20.5,19" fill="#ff9500"/>
      <rect x="11" y="4" width="2" height="15.5" rx="0.3" fill="#ff9500"/>
    </g>
    <text x="640" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Learn</text>
    <text x="640" y="426" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#ebebf5" fill-opacity="0.78" text-anchor="middle">
      <tspan x="640" dy="0">Interactive lessons from bigrams</tspan>
      <tspan x="640" dy="24">to a full transformer</tspan>
    </text>
  </g>

  <!-- CARD 5 — Ops -->
  <g>
    <rect x="858" y="292" width="388" height="234" rx="20" fill="#1c1c1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="858" y="292" width="388" height="3" fill="#ff9500" clip-path="url(#fc5)"/>
    <g transform="translate(1028, 316) scale(2)">
      <g mask="url(#ops-cutout)">
        <circle cx="12" cy="12" r="7" fill="#ff9500"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(45 12 12)"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(90 12 12)"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(135 12 12)"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(180 12 12)"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(225 12 12)"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(270 12 12)"/>
        <rect x="10" y="2" width="4" height="4" rx="0.8" fill="#ff9500" transform="rotate(315 12 12)"/>
      </g>
    </g>
    <text x="1052" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Ops</text>
    <text x="1052" y="426" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#ebebf5" fill-opacity="0.78" text-anchor="middle">
      <tspan x="1052" dy="0">Manage services, monitor</tspan>
      <tspan x="1052" dy="24">CPU/GPU/memory, tail logs</tspan>
    </text>
  </g>
</svg>