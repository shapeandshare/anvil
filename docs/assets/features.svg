      <tspan x="640" dy="24">live loss curves over SSE</tspan>
    </text>
  </g>

  <!-- CARD 2 — Experiments -->
  <g>
    <rect x="858" y="34" width="388" height="234" rx="20" fill="#1c1c1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="858" y="34" width="388" height="3" fill="#ff9500" clip-path="url(#fc2)"/>
    <g transform="translate(1028, 58) scale(2)">
      <path d="M10 4v5l-4 9a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l-4-9V4" fill="#ff9500"/>
      <path d="M9 4h6" stroke="#ff9500" stroke-width="2" fill="none"/>
      <circle cx="11" cy="2.5" r="1.5" fill="#ff9500"/>
      <circle cx="13.5" cy="1" r="1.2" fill="#ff9500"/>
      <circle cx="10" cy="0" r="1" fill="#ff9500"/>
