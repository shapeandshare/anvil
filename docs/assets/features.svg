<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560">
  <defs>
    <clipPath id="fc0"><rect x="34" y="34" width="388" height="234" rx="20"/></clipPath>
    <clipPath id="fc1"><rect x="446" y="34" width="388" height="234" rx="20"/></clipPath>
    <clipPath id="fc2"><rect x="858" y="34" width="388" height="234" rx="20"/></clipPath>
    <clipPath id="fc3"><rect x="34" y="292" width="388" height="234" rx="20"/></clipPath>
    <clipPath id="fc4"><rect x="446" y="292" width="388" height="234" rx="20"/></clipPath>
    <clipPath id="fc5"><rect x="858" y="292" width="388" height="234" rx="20"/></clipPath>
    <mask id="ops-cutout">
      <rect width="24" height="24" fill="white"/>
      <circle cx="12" cy="12" r="3" fill="black"/>
    </mask>
  </defs>

  <!-- CARD 0 — Data -->
  <g>
    <rect x="34" y="34" width="388" height="234" rx="20" fill="#1c1c1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="34" y="34" width="388" height="3" fill="#ff9500" clip-path="url(#fc0)"/>
    <g transform="translate(204, 58) scale(2)">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" fill="#ff9500"/>
    </g>
    <text x="228" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Data</text>
    <text x="228" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#ebebf5" fill-opacity="0.78" text-anchor="middle">
      <tspan x="228" dy="0">Upload &amp; manage corpora, curate</tspan>
      <tspan x="228" dy="24">datasets from your own text</tspan>
    </text>
  </g>

  <!-- CARD 1 — Train -->
  <g>
    <rect x="446" y="34" width="388" height="234" rx="20" fill="#1c1c1e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="446" y="34" width="388" height="3" fill="#ff9500" clip-path="url(#fc1)"/>
    <g transform="translate(616, 58) scale(2)">
      <g stroke="#ff9500" stroke-width="1.3" stroke-linecap="round" fill="none">
        <line x1="5" y1="6" x2="21" y2="14"/>
        <line x1="5" y1="6" x2="16" y2="20"/>
        <line x1="5" y1="6" x2="8" y2="20"/>
        <line x1="12" y1="3" x2="21" y2="14"/>
        <line x1="12" y1="3" x2="16" y2="20"/>
        <line x1="12" y1="3" x2="8" y2="20"/>
        <line x1="19" y1="6" x2="21" y2="14"/>
        <line x1="19" y1="6" x2="16" y2="20"/>
        <line x1="19" y1="6" x2="8" y2="20"/>
        <line x1="21" y1="14" x2="3" y2="14"/>
        <line x1="16" y1="20" x2="3" y2="14"/>
        <line x1="8" y1="20" x2="3" y2="14"/>
      </g>
      <g fill="#ff9500">
        <circle cx="5" cy="6" r="1.6"/>
        <circle cx="12" cy="3" r="1.6"/>
        <circle cx="19" cy="6" r="1.6"/>
        <circle cx="21" cy="14" r="1.6"/>
        <circle cx="16" cy="20" r="1.6"/>
        <circle cx="8" cy="20" r="1.6"/>
        <circle cx="3" cy="14" r="1.6"/>
      </g>
    </g>
    <text x="640" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Train</text>
    <text x="640" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#ebebf5" fill-opacity="0.78" text-anchor="middle">
