      <path d="M3 11 L12 3 L21 11 V21 a1 1 0 0 1-1 1 h-5 v-6 h-6 v6 H4 a1 1 0 0 1-1-1 Z" fill="#ff9500"/>
    </g>
    <g id="icon-folder">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" fill="#ff9500"/>
