      <g fill="#ff9500">
        <rect x="10.6" y="1.5" width="2.8" height="4" rx="0.6"/>
        <rect x="10.6" y="18.5" width="2.8" height="4" rx="0.6"/>
        <rect x="1.5" y="10.6" width="4" height="2.8" rx="0.6"/>
        <rect x="18.5" y="10.6" width="4" height="2.8" rx="0.6"/>
      </g>
    </g>
