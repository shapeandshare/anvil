<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" width="1280" height="460">
  <defs>
    <linearGradient id="forge-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect x="0" y="0" width="1280" height="460" rx="24" fill="#0c0c0d"/>

  <!-- ===== LEFT HALF: MODEL ANATOMY ===== -->

  <!-- Section header -->
  <text x="60" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5" fill="#8e8e93">ANATOMY</text>

  <!-- Layer 1 (detail bar) -->
  <rect x="60" y="90" width="520" height="56" rx="8" fill="#1c1c1e" stroke="url(#forge-grad)" stroke-width="1.5"/>

  <!-- 16 embedding cells grouped into 4 heads -->
  <!-- Head 0 (cells 0-3): #ff9500 -->
  <rect x="101" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>
  <rect x="128" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>
  <rect x="155" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>
  <rect x="182" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>

  <!-- Head 1 (cells 4-7): #ffcc00 -->
  <rect x="212" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>
  <rect x="239" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>
  <rect x="266" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>
  <rect x="293" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>

  <!-- Head 2 (cells 8-11): #ff9500 -->
  <rect x="323" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>
  <rect x="350" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>
  <rect x="377" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>
  <rect x="404" y="97" width="24" height="32" rx="3" fill="#ff9500" stroke="#ff9500" stroke-width="1"/>

  <!-- Head 3 (cells 12-15): #ffcc00 -->
  <rect x="434" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>
  <rect x="461" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>
  <rect x="488" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>
  <rect x="515" y="97" width="24" height="32" rx="3" fill="#ffcc00" stroke="#ff9500" stroke-width="1"/>

  <!-- Layer 2 (simplified bar) -->
  <rect x="60" y="181" width="520" height="56" rx="8" fill="#2c2c2e"/>

  <!-- Layer 3 (simplified bar) -->
  <rect x="60" y="272" width="520" height="56" rx="8" fill="#2c2c2e"/>

  <!-- n_embd label with leader -->
  <line x1="320" y1="80" x2="320" y2="87" stroke="#ff9500" stroke-width="1.5"/>
  <text x="320" y="76" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="url(#forge-grad)">n_embd = 16</text>

  <!-- n_head bracket with label -->
  <line x1="101" y1="160" x2="539" y2="160" stroke="#ff9500" stroke-width="1.5"/>
  <line x1="101" y1="156" x2="101" y2="160" stroke="#ff9500" stroke-width="1.5"/>
  <line x1="539" y1="156" x2="539" y2="160" stroke="#ff9500" stroke-width="1.5"/>
  <text x="320" y="173" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="url(#forge-grad)">n_head = 4</text>

  <!-- n_layer bracket with label -->
  <line x1="585" y1="95" x2="585" y2="323" stroke="#ff9500" stroke-width="1.5"/>
  <line x1="581" y1="95" x2="585" y2="95" stroke="#ff9500" stroke-width="1.5"/>
  <line x1="581" y1="323" x2="585" y2="323" stroke="#ff9500" stroke-width="1.5"/>
  <text x="596" y="209" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="url(#forge-grad)">n_layer = 3</text>

  <!-- ===== RIGHT HALF: HYPERPARAMETER DEFAULTS ===== -->

  <!-- Settings panel container -->
  <rect x="720" y="65" width="524" height="360" rx="16" fill="#1c1c1e"/>

  <!-- Panel header -->
  <text x="748" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5" fill="#8e8e93">DEFAULTS</text>

  <!-- Row 1: n_embd -->
  <text x="748" y="148" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ffffff">n_embd</text>
  <text x="1090" y="148" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#ff9500">16</text>
  <line x1="748" y1="170" x2="1220" y2="170" stroke="#38383a" stroke-width="1"/>

  <!-- Row 2: n_layer -->
  <text x="748" y="198" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ffffff">n_layer</text>
  <text x="1090" y="198" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#ff9500">1</text>
  <line x1="748" y1="220" x2="1220" y2="220" stroke="#38383a" stroke-width="1"/>

  <!-- Row 3: n_head -->
  <text x="748" y="248" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ffffff">n_head</text>
  <text x="1090" y="248" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#ff9500">4</text>
  <line x1="748" y1="270" x2="1220" y2="270" stroke="#38383a" stroke-width="1"/>

  <!-- Row 4: num_steps -->
  <text x="748" y="298" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ffffff">num_steps</text>
  <text x="1090" y="298" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#ff9500">1000</text>
  <line x1="748" y1="320" x2="1220" y2="320" stroke="#38383a" stroke-width="1"/>

  <!-- Row 5: learning_rate -->
  <text x="748" y="348" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ffffff">learning_rate</text>
  <text x="1090" y="348" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#ff9500">0.01</text>
  <line x1="748" y1="370" x2="1220" y2="370" stroke="#38383a" stroke-width="1"/>

  <!-- Row 6: temperature -->
  <text x="748" y="398" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#ffffff">temperature</text>
  <text x="1090" y="398" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" font-weight="700" fill="#ff9500">0.5</text>

</svg>