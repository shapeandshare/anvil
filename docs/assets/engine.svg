<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="100%" height="100%">
  <defs>
    <!-- Forge gradient: orange → yellow for accent titles and bars -->
    <linearGradient id="forgeGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>

    <!-- Forge glow for the ×N bracket -->
    <filter id="bracketGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <!-- Subtle drop shadow on blocks -->
    <filter id="blockShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Downward arrowhead marker -->
    <marker id="arrowDown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ff9500"/>
    </marker>

    <!-- Rightward arrowhead marker for residual connections -->
    <marker id="arrowRight" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ff9500" fill-opacity="0.65"/>
    </marker>
  </defs>

  <!-- Solid dark background panel — opaque for GitHub light-theme legibility -->
  <rect x="0" y="0" width="1280" height="620" rx="24" fill="#0c0c0d"/>

  <!-- ===== TOP LABEL: byte-level tokenizer ===== -->
  <text x="640" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#ebebf5" opacity="0.7" letter-spacing="1.2">byte-level tokenizer</text>

  <!-- ================================================================== -->
  <!-- CONNECTING ARROWS (drawn first so they sit behind blocks)          -->
  <!-- ================================================================== -->

  <!-- Arrow: label → Token Embedding -->
  <line x1="640" y1="48" x2="640" y2="66" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Arrow: Token Embedding → RMSNorm (rms_1) -->
  <line x1="640" y1="116" x2="640" y2="138" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Arrow: RMSNorm (rms_1) → Multi-Head Attention -->
  <line x1="640" y1="196" x2="640" y2="218" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Arrow: Multi-Head Attention → RMSNorm (rms_2) -->
  <line x1="640" y1="276" x2="640" y2="298" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Arrow: RMSNorm (rms_2) → SwiGLU MLP -->
  <line x1="640" y1="356" x2="640" y2="378" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Arrow: SwiGLU MLP → RMSNorm (rms_final) -->
  <line x1="640" y1="436" x2="640" y2="458" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Arrow: RMSNorm (rms_final) → LM Head -->
  <line x1="640" y1="516" x2="640" y2="538" stroke="#ff9500" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- ================================================================== -->
  <!-- RESIDUAL / SKIP CONNECTIONS                                        -->
  <!-- ================================================================== -->

  <!-- Residual 1: bypasses RMSNorm(rms_1) → Multi-Head Attention -->
  <!-- Starts from gap after Token Embedding (y=128), ends at gap after Attention (y=288) -->
  <path d="M 370 128 C 285 128, 285 208, 370 288" fill="none" stroke="#ff9500" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round" stroke-dasharray="none" marker-end="url(#arrowRight)"/>

  <!-- Add circle at re-entry point for Residual 1 -->
  <circle cx="370" cy="288" r="7" fill="none" stroke="#ff9500" stroke-width="1.5" stroke-opacity="0.65"/>
  <text x="370" y="292" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ff9500" fill-opacity="0.65">+</text>

  <!-- Small horizontal arrow from add circle into the main path -->
  <line x1="377" y1="288" x2="386" y2="288" stroke="#ff9500" stroke-width="1.5" stroke-opacity="0.65" marker-end="url(#arrowRight)"/>

  <!-- Residual 2: bypasses RMSNorm(rms_2) → SwiGLU MLP -->
  <!-- Starts from gap after Attention (y=288), ends at gap after SwiGLU (y=448) -->
  <path d="M 350 288 C 265 288, 265 368, 350 448" fill="none" stroke="#ff9500" stroke-width="2" stroke-opacity="0.65" stroke-linecap="round" stroke-dasharray="none" marker-end="url(#arrowRight)"/>

  <!-- Add circle at re-entry point for Residual 2 -->
  <circle cx="350" cy="448" r="7" fill="none" stroke="#ff9500" stroke-width="1.5" stroke-opacity="0.65"/>
  <text x="350" y="452" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ff9500" fill-opacity="0.65">+</text>

  <!-- Small horizontal arrow from add circle into the main path -->
  <line x1="357" y1="448" x2="366" y2="448" stroke="#ff9500" stroke-width="1.5" stroke-opacity="0.65" marker-end="url(#arrowRight)"/>

  <!-- ================================================================== -->
  <!-- STANDARD BLOCK: Token Embedding                                    -->
  <!-- ================================================================== -->

  <rect x="380" y="68" width="520" height="48" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1" filter="url(#blockShadow)"/>
  <text x="640" y="98" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Token Embedding</text>

  <!-- ================================================================== -->
  <!-- HERO BLOCK: RMSNorm (rms_1)                                        -->
  <!-- ================================================================== -->

  <g filter="url(#blockShadow)">
    <rect x="380" y="140" width="520" height="56" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <!-- Forge-orange 3px left accent bar -->
    <rect x="380" y="140" width="3" height="56" fill="url(#forgeGradient)"/>
  </g>
  <!-- Title -->
  <text x="400" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="url(#forgeGradient)">RMSNorm</text>
  <!-- Mono detail label -->
  <text x="400" y="185" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.85">rms_1</text>
  <!-- Right-side tag -->
  <text x="910" y="173" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.55">learned scale</text>

  <!-- ================================================================== -->
  <!-- HERO BLOCK: Multi-Head Attention + RoPE                            -->
  <!-- ================================================================== -->

  <g filter="url(#blockShadow)">
    <rect x="380" y="220" width="520" height="56" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="380" y="220" width="3" height="56" fill="url(#forgeGradient)"/>
  </g>
  <text x="400" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="url(#forgeGradient)">Multi-Head Attention</text>
  <text x="400" y="265" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.85">+ RoPE · rotary position encoding</text>
  <text x="910" y="253" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.55">rotary position encoding</text>

  <!-- ================================================================== -->
  <!-- HERO BLOCK: RMSNorm (rms_2)                                        -->
  <!-- ================================================================== -->

  <g filter="url(#blockShadow)">
    <rect x="380" y="300" width="520" height="56" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="380" y="300" width="3" height="56" fill="url(#forgeGradient)"/>
  </g>
  <text x="400" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="url(#forgeGradient)">RMSNorm</text>
  <text x="400" y="345" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.85">rms_2</text>
  <text x="910" y="333" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.55">learned scale</text>

  <!-- ================================================================== -->
  <!-- HERO BLOCK: SwiGLU MLP                                             -->
  <!-- ================================================================== -->

  <g filter="url(#blockShadow)">
    <rect x="380" y="380" width="520" height="56" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="380" y="380" width="3" height="56" fill="url(#forgeGradient)"/>
  </g>
  <text x="400" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="url(#forgeGradient)">SwiGLU MLP</text>
  <text x="400" y="425" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.85">gate · up · down  (SiLU)</text>
  <text x="910" y="413" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.55">SiLU-gated feed-forward</text>

  <!-- ================================================================== -->
  <!-- HERO BLOCK: RMSNorm (rms_final)                                    -->
  <!-- ================================================================== -->

  <g filter="url(#blockShadow)">
    <rect x="380" y="460" width="520" height="56" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="380" y="460" width="3" height="56" fill="url(#forgeGradient)"/>
  </g>
  <text x="400" y="486" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="url(#forgeGradient)">RMSNorm</text>
  <text x="400" y="505" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.85">rms_final</text>
  <text x="910" y="493" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#ebebf5" fill-opacity="0.55">learned scale</text>

  <!-- ================================================================== -->
  <!-- STANDARD BLOCK: LM Head → logits                                   -->
  <!-- ================================================================== -->

  <rect x="380" y="540" width="520" height="48" rx="14" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1" filter="url(#blockShadow)"/>
  <text x="640" y="570" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">LM Head  →  logits</text>

  <!-- ================================================================== -->
  <!-- × N LAYERS BRACKET (right side)                                    -->
  <!-- ================================================================== -->

  <!-- Vertical timing bracket spanning attention→MLP region -->
  <!-- Top: y=220 (top of Attention block) · Bottom: y=436 (bottom of SwiGLU MLP block) -->
  <g filter="url(#bracketGlow)">
    <!-- Top cap -->
    <line x1="990" y1="220" x2="980" y2="220" stroke="#ff9500" stroke-width="2" stroke-opacity="0.7"/>
    <!-- Bottom cap -->
    <line x1="990" y1="436" x2="980" y2="436" stroke="#ff9500" stroke-width="2" stroke-opacity="0.7"/>
    <!-- Vertical line -->
    <line x1="990" y1="220" x2="990" y2="436" stroke="#ff9500" stroke-width="2" stroke-opacity="0.7"/>
  </g>
  <!-- Bracket label -->
  <text x="1000" y="334" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="800" fill="url(#forgeGradient)" letter-spacing="0.5">× N Layers</text>

  <!-- ================================================================== -->
  <!-- RIGHT-SIDE KEY ICON LABEL                                          -->
  <!-- ================================================================== -->

  <text x="1048" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#ebebf5" fill-opacity="0.25" letter-spacing="1.5">KEY</text>

  <!-- Key: hero block indicator -->
  <rect x="1048" y="336" width="10" height="10" rx="2" fill="#1c1c1e" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <rect x="1048" y="336" width="3" height="10" fill="url(#forgeGradient)"/>
  <text x="1064" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#ebebf5" fill-opacity="0.35">anvil Llama primitive</text>

  <!-- Key: residual connection -->
  <line x1="1048" y1="364" x2="1058" y2="364" stroke="#ff9500" stroke-width="2" stroke-opacity="0.65"/>
  <text x="1064" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" fill="#ebebf5" fill-opacity="0.35">residual / skip connection</text>

  <!-- ================================================================== -->
  <!-- FOOTER: credit line                                                -->
  <!-- ================================================================== -->

  <text x="640" y="608" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" font-weight="500" fill="#ebebf5" fill-opacity="0.2" letter-spacing="0.8">single transformer block with modern Llama primitives</text>
</svg>
